name: Golden Tests

on:
  # Golden tests require model files not available on GitHub-hosted runners.
  # Run manually or on self-hosted runners with models at models/.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: golden-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  golden-tests:
    name: Golden Tests - ${{ matrix.backend }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: CPU
            runner: ubuntu-latest
            cache-suffix: linux
          - backend: Metal
            runner: macos-latest
            cache-suffix: macos
          - backend: Vulkan
            runner: ubuntu-latest
            cache-suffix: vulkan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Vulkan SDK
        if: matrix.backend == 'Vulkan'
        run: |
          sudo install -dm755 /etc/apt/keyrings
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/keyrings/lunarg-archive-keyring.asc > /dev/null
          CODENAME=$(lsb_release -cs)
          echo "deb [signed-by=/etc/apt/keyrings/lunarg-archive-keyring.asc] https://packages.lunarg.com/vulkan/ ${CODENAME} main" | sudo tee /etc/apt/sources.list.d/lunarg-vulkan.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends vulkan-sdk

      - name: Cache Zig build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .zig-cache
            ${{ runner.os == 'macOS' && '~/Library/Caches/zig' || '~/.cache/zig' }}
          key: zig-${{ env.ZIG_VERSION }}-golden-${{ matrix.cache-suffix }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: zig-${{ env.ZIG_VERSION }}-golden-${{ matrix.cache-suffix }}-

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Build Agave
        run: zig build

      - name: Run golden tests (${{ matrix.backend }} backend)
        run: |
          set +e
          rc=0
          failed=""
          for test_file in tests/models/test_*.zig; do
            echo "::group::$(basename "$test_file")"
            if zig test "$test_file" --test-filter "${{ matrix.backend }}"; then
              echo "PASS: $test_file"
            else
              rc=1
              failed="$failed $(basename "$test_file")"
              echo "::error::FAIL: $test_file (${{ matrix.backend }} backend)"
            fi
            echo "::endgroup::"
          done
          if [ -n "$failed" ]; then
            echo "::error::Failed golden tests:$failed"
          fi
          exit $rc
