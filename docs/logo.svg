<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <defs>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016"/>
      <stop offset="50%" style="stop-color:#4a8c2a"/>
      <stop offset="100%" style="stop-color:#6abf40"/>
    </linearGradient>
  </defs>
  <!-- Agave plant icon -->
  <g transform="translate(60, 100)">
    <!-- Center leaf -->
    <path d="M0,-70 Q5,-35 0,0" stroke="url(#ag)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Left leaves -->
    <path d="M0,0 Q-20,-30 -15,-65" stroke="url(#ag)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M0,0 Q-30,-20 -35,-50" stroke="url(#ag)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M0,5 Q-35,-5 -48,-25" stroke="url(#ag)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Right leaves -->
    <path d="M0,0 Q20,-30 15,-65" stroke="url(#ag)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M0,0 Q30,-20 35,-50" stroke="url(#ag)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M0,5 Q35,-5 48,-25" stroke="url(#ag)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Outer leaves -->
    <path d="M0,10 Q-38,5 -55,-8" stroke="url(#ag)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M0,10 Q38,5 55,-8" stroke="url(#ag)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="130" y="125" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="#1a1a1a" letter-spacing="-2">agave</text>
  <!-- Tagline -->
  <text x="134" y="158" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#666" letter-spacing="4" font-weight="300">LLM INFERENCE ENGINE</text>
</svg>
